<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formulario</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
</head>
<body>

	<div class="container">

		<h2>Hola mundo tomcat</h2>

		<form action="/TechShop/form" method="post">

			<div class="mb-3">
				<label for="username" class="form-label">Username</label> <input
					type="text" class="form-control" id="username" name="username">
			</div>
			<div class="mb-3">
				<label for="password" class="form-label">Password</label> <input
					type="password" class="form-control" id="password" name="password">
			</div>
			<div class="mb-3">
				<label for="email" class="form-label">Email</label> <input
					type="email" class="form-control" id="email" name="email">
			</div>

			<div class="mb-3">

				<label for="paises" class="form-label">Paises</label>
				<select class="form-select" multiple name="paises" id="paises"
					aria-label="Default select example">
					<option value="Argentina">Argentina</option>
					<option value="España">España</option>
					<option value="Italia">Italia</option>
				</select>
			</div>

			<div class="mb-3">
				<h5>Idiomas</h5>
				<input class="form-check-radio" type="radio" value="Español" id="español"
					name="java"> <label class="form-check-label" for="español">
					Español </label>
				<div>
					<input class="form-check-radio" type="radio" value="Ingles" id="ingles"
					name="java"> <label class="form-check-label" for="ingles">
					Ingles </label>
				</div>

			</div>

			<div class="mb-3">
				<button type="submit" class="btn btn-primary mb-3">Enviar</button>
			</div>

		</form>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
